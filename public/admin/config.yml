backend:
  name: github
  repo: mohammedALrabeai/artalsecurity
  branch: main
  # Worker المصادقة (سيُنشَر باسم sveltia-cms-auth على نطاقك في workers.dev):
  base_url: https://sveltia-cms-auth.mohammedalrabeai.workers.dev

site_url: https://artalsecurity.com
display_url: https://artalsecurity.com

# مكتبة الوسائط (الصور تُرفَع هنا وتُحفَظ في المستودع)
media_folder: "public/images"
public_folder: "/images"

collections:
  # ───────── المدوّنة (إضافة/تعديل مقالات بلغتين) ─────────
  - name: blog
    label: "المدوّنة / Blog"
    label_singular: "مقال / Article"
    folder: "content/blog"
    create: true
    extension: json
    format: json
    slug: "{{fields.slug}}"
    identifier_field: slug
    summary: "{{fields.ar.title}}"
    fields:
      - { name: slug, label: "Slug (رابط بالإنجليزية، بدون مسافات)", widget: string, pattern: ['^[a-z0-9-]+$', 'أحرف إنجليزية صغيرة وأرقام وشرطات فقط'] }
      - { name: date, label: "التاريخ", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { name: category_ar, label: "التصنيف (عربي)", widget: string }
      - { name: category_en, label: "Category (English)", widget: string }
      - { name: keywords, label: "كلمات مفتاحية (عربي + إنجليزي، مفصولة بفواصل)", widget: text }
      - name: ar
        label: "المحتوى العربي"
        widget: object
        fields:
          - { name: title, label: "العنوان", widget: string }
          - { name: description, label: "وصف الميتا (≈155 حرفاً)", widget: text }
          - { name: excerpt, label: "مقتطف قصير", widget: text }
          - { name: body, label: "المتن (Markdown)", widget: markdown }
      - name: en
        label: "English content"
        widget: object
        fields:
          - { name: title, label: "Title", widget: string }
          - { name: description, label: "Meta description (~155 chars)", widget: text }
          - { name: excerpt, label: "Short excerpt", widget: text }
          - { name: body, label: "Body (Markdown)", widget: markdown }

  # ───────── القطاعات ─────────
  - name: sectors
    label: "القطاعات / Sectors"
    label_singular: "قطاع / Sector"
    folder: "content/sectors"
    create: true
    extension: json
    format: json
    slug: "{{fields.slug}}"
    identifier_field: slug
    summary: "{{fields.ar.name}}"
    fields:
      - { name: order, label: "الترتيب", widget: number, value_type: int, default: 0 }
      - { name: slug, label: "Slug (إنجليزي)", widget: string, pattern: ['^[a-z0-9-]+$', 'أحرف صغيرة وأرقام وشرطات'] }
      - { name: keywords, label: "كلمات مفتاحية", widget: text }
      - name: ar
        label: "المحتوى العربي"
        widget: object
        fields:
          - { name: name, label: "الاسم المختصر", widget: string }
          - { name: title, label: "عنوان الميتا", widget: string }
          - { name: description, label: "وصف الميتا", widget: text }
          - { name: heading, label: "العنوان الرئيسي (H1)", widget: string }
          - { name: intro, label: "المقدمة", widget: text }
          - { name: sites, label: "ما نؤمّنه", widget: list }
          - { name: points, label: "لماذا نحن", widget: list }
          - name: faqs
            label: "الأسئلة الشائعة"
            widget: list
            fields:
              - { name: q, label: "سؤال", widget: string }
              - { name: a, label: "جواب", widget: text }
      - name: en
        label: "English content"
        widget: object
        fields:
          - { name: name, label: "Short name", widget: string }
          - { name: title, label: "Meta title", widget: string }
          - { name: description, label: "Meta description", widget: text }
          - { name: heading, label: "Heading (H1)", widget: string }
          - { name: intro, label: "Intro", widget: text }
          - { name: sites, label: "What we secure", widget: list }
          - { name: points, label: "Why us", widget: list }
          - name: faqs
            label: "FAQs"
            widget: list
            fields:
              - { name: q, label: "Question", widget: string }
              - { name: a, label: "Answer", widget: text }

  # ───────── الخدمات ─────────
  - name: services
    label: "الخدمات / Services"
    label_singular: "خدمة / Service"
    folder: "content/services"
    create: true
    extension: json
    format: json
    slug: "{{fields.slug}}"
    identifier_field: slug
    summary: "{{fields.ar.name}}"
    fields:
      - { name: order, label: "الترتيب", widget: number, value_type: int, default: 0 }
      - { name: slug, label: "Slug (إنجليزي)", widget: string, pattern: ['^[a-z0-9-]+$', 'أحرف صغيرة وأرقام وشرطات'] }
      - { name: keywords, label: "كلمات مفتاحية", widget: text }
      - name: ar
        label: "المحتوى العربي"
        widget: object
        fields:
          - { name: name, label: "الاسم", widget: string }
          - { name: title, label: "عنوان الميتا", widget: string }
          - { name: description, label: "وصف الميتا", widget: text }
          - { name: heading, label: "العنوان الرئيسي (H1)", widget: string }
          - { name: intro, label: "المقدمة", widget: text }
          - { name: features, label: "ماذا تشمل الخدمة", widget: list }
          - name: faqs
            label: "الأسئلة الشائعة"
            widget: list
            fields:
              - { name: q, label: "سؤال", widget: string }
              - { name: a, label: "جواب", widget: text }
      - name: en
        label: "English content"
        widget: object
        fields:
          - { name: name, label: "Name", widget: string }
          - { name: title, label: "Meta title", widget: string }
          - { name: description, label: "Meta description", widget: text }
          - { name: heading, label: "Heading (H1)", widget: string }
          - { name: intro, label: "Intro", widget: text }
          - { name: features, label: "What the service includes", widget: list }
          - name: faqs
            label: "FAQs"
            widget: list
            fields:
              - { name: q, label: "Question", widget: string }
              - { name: a, label: "Answer", widget: text }

  # ───────── المدن ─────────
  - name: locations
    label: "المدن / Locations"
    label_singular: "مدينة / City"
    folder: "content/locations"
    create: true
    extension: json
    format: json
    slug: "{{fields.slug}}"
    identifier_field: slug
    summary: "{{fields.ar.name}}"
    fields:
      - { name: order, label: "الترتيب", widget: number, value_type: int, default: 0 }
      - { name: slug, label: "Slug (إنجليزي)", widget: string, pattern: ['^[a-z0-9-]+$', 'أحرف صغيرة وأرقام وشرطات'] }
      - name: ar
        label: "المحتوى العربي"
        widget: object
        fields:
          - { name: name, label: "اسم المدينة", widget: string }
          - { name: region, label: "المنطقة", widget: string }
          - { name: blurb, label: "وصف تعريفي", widget: text }
      - name: en
        label: "English content"
        widget: object
        fields:
          - { name: name, label: "City name", widget: string }
          - { name: region, label: "Region", widget: string }
          - { name: blurb, label: "Blurb", widget: text }

  # ───────── إعدادات الموقع (الأرقام + التواصل + الفيديو) ─────────
  - name: settings
    label: "إعدادات الموقع / Site Settings"
    files:
      - name: general
        label: "الإعدادات العامة"
        file: "content/settings.json"
        fields:
          - name: stats
            label: "الأرقام الرئيسية (تظهر في الواجهة والبطل)"
            widget: list
            fields:
              - { name: value, label: "القيمة (رقم مثل 100 أو نص مثل 24/7)", widget: string }
              - { name: suffix, label: "لاحقة (مثل + اتركها فارغة إن لم تُرد)", widget: string, required: false, default: "" }
              - { name: labelAr, label: "الوصف (عربي)", widget: string }
              - { name: labelEn, label: "Label (English)", widget: string }
              - { name: show, label: "إظهار؟", widget: boolean, default: true }
          - name: contact
            label: "بيانات التواصل"
            widget: object
            fields:
              - { name: phones, label: "أرقام الهاتف", widget: list, field: { name: phone, label: "هاتف", widget: string } }
              - { name: emails, label: "البريد الإلكتروني", widget: list, field: { name: email, label: "بريد", widget: string } }
              - { name: addressAr, label: "العنوان (عربي)", widget: string }
              - { name: addressEn, label: "Address (English)", widget: string }
              - { name: mapUrl, label: "رابط خرائط جوجل", widget: string, required: false }
              - { name: license, label: "رقم الترخيص", widget: string }
          - name: video
            label: "الفيديو التعريفي"
            widget: object
            fields:
              - { name: youtubeId, label: "معرّف فيديو يوتيوب (اتركه فارغاً لإخفاء القسم)", widget: string, required: false, default: "" }

  # ───────── آراء العملاء ─────────
  - name: testimonials
    label: "آراء العملاء / Testimonials"
    label_singular: "رأي / Testimonial"
    folder: "content/testimonials"
    create: true
    extension: json
    format: json
    summary: "{{fields.ar.name}}"
    fields:
      - { name: order, label: "الترتيب", widget: number, value_type: int, default: 0 }
      - { name: rating, label: "التقييم (1–5 نجوم)", widget: number, value_type: int, default: 5, min: 1, max: 5 }
      - name: ar
        label: "عربي"
        widget: object
        fields:
          - { name: name, label: "اسم العميل/الجهة", widget: string }
          - { name: position, label: "المنصب/الوصف", widget: string }
          - { name: content, label: "نص الرأي", widget: text }
      - name: en
        label: "English"
        widget: object
        fields:
          - { name: name, label: "Client / Entity name", widget: string }
          - { name: position, label: "Position / Role", widget: string }
          - { name: content, label: "Testimonial text", widget: text }

  # ───────── الأعمال / المشاريع ─────────
  - name: projects
    label: "الأعمال / Projects"
    label_singular: "عمل / Project"
    folder: "content/projects"
    create: true
    extension: json
    format: json
    summary: "{{fields.ar.title}}"
    fields:
      - { name: order, label: "الترتيب", widget: number, value_type: int, default: 0 }
      - { name: image, label: "الصورة", widget: image }
      - name: ar
        label: "عربي"
        widget: object
        fields:
          - { name: title, label: "العنوان", widget: string }
          - { name: description, label: "الوصف", widget: text }
      - name: en
        label: "English"
        widget: object
        fields:
          - { name: title, label: "Title", widget: string }
          - { name: description, label: "Description", widget: text }

  # ───────── الشهادات والاعتمادات (شبكة الصور) ─────────
  - name: certificates
    label: "الشهادات / Certificates"
    label_singular: "شهادة / Certificate"
    folder: "content/certificates"
    create: true
    extension: json
    format: json
    summary: "{{fields.labelAr}}"
    fields:
      - { name: order, label: "الترتيب", widget: number, value_type: int, default: 0 }
      - { name: image, label: "صورة الشهادة", widget: image }
      - { name: labelAr, label: "الوصف (عربي)", widget: string }
      - { name: labelEn, label: "Label (English)", widget: string }
