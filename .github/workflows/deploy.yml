name: Build & Deploy (Hostinger shared hosting)

# يبني الموقع (SSG) ويرفع مجلد build/ فقط إلى مجلد الدومين الرئيسي عبر FTPS.
# الأمان:
#  - يرفع داخل FTP_SERVER_DIR فقط (مجلد الدومين الرئيسي) ولا يلمس الدومينات الفرعية الموجودة في مجلدات أخرى.
#  - يستثني public/** لحماية صور الموقع المرفوعة يدوياً (صور الهيرو) من الحذف.
#  - الأسرار تُقرأ من GitHub Secrets (لا تُوضع في الكود إطلاقاً).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (vite-react-ssg + sitemap)
        run: npm run build

      - name: Deploy build/ to Hostinger via FTPS
        # يتخطّى الخطوة بأمان إذا لم تُضبط الأسرار بعد (لا فشل مزعج قبل الإعداد)
        if: env.FTP_SERVER != ''
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./build/
          # مجلد الدومين الرئيسي فقط (مثال: /public_html/ أو /domains/artalsecurity.com/public_html/)
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # حماية: لا تحذف هذه المسارات من السيرفر (صور الهيرو المرفوعة يدوياً + ملفات النظام)
          exclude: |
            **/.git*
            **/.git*/**
            **/.ftp-deploy-sync-state.json
            public/**
            cgi-bin/**
